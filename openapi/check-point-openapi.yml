openapi: 3.1.0
info:
  title: Check Point Management Web API
  version: "latest"
  description: |
    REST-based Web Services API for the Check Point Quantum Security
    Management Server. All commands are invoked as HTTP POST to
    /web_api/{command} with a JSON body. After calling /web_api/login with
    administrator credentials, subsequent requests authenticate with the
    returned session ID supplied in the X-chkp-sid header. Configuration
    changes are staged until you call /web_api/publish. Only the most
    commonly used commands are surfaced here; the full inventory is at
    https://sc1.checkpoint.com/documents/latest/APIs/index.html.
  contact:
    name: Check Point Management API Reference
    url: https://sc1.checkpoint.com/documents/latest/APIs/index.html
servers:
  - url: https://{management_server}/web_api
    description: Security Management Server base URL
    variables:
      management_server:
        default: management.example.com
        description: Hostname or IP of the Check Point Management Server
security:
  - sessionId: []
tags:
  - name: Session
  - name: Hosts
  - name: Networks
  - name: Access Rules
  - name: Gateways
paths:
  /login:
    post:
      tags: [Session]
      summary: Login and obtain a session ID (sid)
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user: { type: string }
                password: { type: string, format: password }
                "api-key": { type: string, description: "Use api-key instead of user/password when authenticating with an API key" }
                domain: { type: string }
                "read-only": { type: boolean }
                "continue-last-session": { type: boolean }
              required: []
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
  /logout:
    post:
      tags: [Session]
      summary: Logout and invalidate the session ID
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
  /publish:
    post:
      tags: [Session]
      summary: Publish staged changes
      operationId: publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Publish task accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskResponse" }
  /show-hosts:
    post:
      tags: [Hosts]
      summary: List host objects
      operationId: showHosts
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ListQuery" }
      responses:
        "200":
          description: Host collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items: { $ref: "#/components/schemas/Host" }
                  from: { type: integer }
                  to: { type: integer }
                  total: { type: integer }
  /show-host:
    post:
      tags: [Hosts]
      summary: Retrieve a single host object
      operationId: showHost
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ObjectLookup" }
      responses:
        "200":
          description: Host
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Host" }
  /add-host:
    post:
      tags: [Hosts]
      summary: Create a host object
      operationId: addHost
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HostCreate" }
      responses:
        "200":
          description: Host created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Host" }
  /set-host:
    post:
      tags: [Hosts]
      summary: Update a host object
      operationId: setHost
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HostCreate" }
      responses:
        "200":
          description: Host updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Host" }
  /delete-host:
    post:
      tags: [Hosts]
      summary: Delete a host object
      operationId: deleteHost
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ObjectLookup" }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
  /show-networks:
    post:
      tags: [Networks]
      summary: List network objects
      operationId: showNetworks
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ListQuery" }
      responses:
        "200":
          description: Network collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items: { $ref: "#/components/schemas/Network" }
                  total: { type: integer }
  /add-network:
    post:
      tags: [Networks]
      summary: Create a network object
      operationId: addNetwork
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetworkCreate" }
      responses:
        "200":
          description: Network created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Network" }
  /show-access-rulebase:
    post:
      tags: [Access Rules]
      summary: Show an access control rulebase
      operationId: showAccessRulebase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, description: "Layer name, e.g. 'Network'" }
                package: { type: string }
                offset: { type: integer }
                limit: { type: integer, default: 50 }
                "details-level": { type: string, enum: [uid, standard, full] }
      responses:
        "200":
          description: Rulebase contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  rulebase:
                    type: array
                    items: { type: object }
                  total: { type: integer }
  /add-access-rule:
    post:
      tags: [Access Rules]
      summary: Add an access rule to a layer
      operationId: addAccessRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [layer, position]
              properties:
                layer: { type: string }
                position:
                  oneOf:
                    - { type: string, enum: [top, bottom] }
                    - { type: integer }
                name: { type: string }
                source: { type: array, items: { type: string } }
                destination: { type: array, items: { type: string } }
                service: { type: array, items: { type: string } }
                action: { type: string, enum: [Accept, Drop, Reject, Inform, Ask, "User Auth", "Client Auth"] }
                track: { type: string }
                enabled: { type: boolean }
      responses:
        "200":
          description: Rule created
          content:
            application/json:
              schema: { type: object }
  /show-simple-gateways:
    post:
      tags: [Gateways]
      summary: List simple gateways
      operationId: showSimpleGateways
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ListQuery" }
      responses:
        "200":
          description: Gateway collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items: { type: object }
                  total: { type: integer }
components:
  securitySchemes:
    sessionId:
      type: apiKey
      in: header
      name: X-chkp-sid
      description: Session ID returned by /login, supplied on every subsequent call.
  schemas:
    LoginResponse:
      type: object
      properties:
        sid: { type: string, description: "Session ID for subsequent requests" }
        url: { type: string, format: uri }
        "session-timeout": { type: integer }
        "last-login-was-at":
          type: object
          properties:
            posix: { type: integer, format: int64 }
            iso-8601: { type: string }
        uid: { type: string }
        "api-server-version": { type: string }
    GenericMessage:
      type: object
      properties:
        message: { type: string }
    TaskResponse:
      type: object
      properties:
        "task-id": { type: string }
    ListQuery:
      type: object
      properties:
        offset: { type: integer, default: 0 }
        limit: { type: integer, default: 50, maximum: 500 }
        filter: { type: string }
        order:
          type: array
          items:
            type: object
            properties:
              ASC: { type: string }
              DESC: { type: string }
        "details-level": { type: string, enum: [uid, standard, full] }
    ObjectLookup:
      type: object
      properties:
        name: { type: string }
        uid: { type: string }
        "details-level": { type: string, enum: [uid, standard, full] }
      anyOf:
        - { required: [name] }
        - { required: [uid] }
    Host:
      type: object
      properties:
        uid: { type: string }
        name: { type: string }
        type: { type: string, enum: [host] }
        "ipv4-address": { type: string }
        "ipv6-address": { type: string }
        comments: { type: string }
        color: { type: string }
        groups: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
    HostCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        "ip-address": { type: string }
        "ipv4-address": { type: string }
        "ipv6-address": { type: string }
        comments: { type: string }
        color: { type: string }
        groups: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        "set-if-exists": { type: boolean }
    Network:
      type: object
      properties:
        uid: { type: string }
        name: { type: string }
        type: { type: string, enum: [network] }
        subnet4: { type: string }
        "mask-length4": { type: integer }
        subnet6: { type: string }
        "mask-length6": { type: integer }
        "nat-settings": { type: object }
        comments: { type: string }
    NetworkCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        subnet: { type: string }
        subnet4: { type: string }
        subnet6: { type: string }
        "mask-length": { type: integer }
        "mask-length4": { type: integer }
        "mask-length6": { type: integer }
        "subnet-mask": { type: string }
        "nat-settings": { type: object }
        tags: { type: array, items: { type: string } }
        comments: { type: string }
